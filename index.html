<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Electron Mangareader</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0f1115;
    --fg: #eef0f3;
    --muted: #9aa3af;
    --accent: #6ea8fe;
    --card: #171a21;
    --border: #262b35;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff;
      --fg: #14161a;
      --muted: #555c66;
      --accent: #2563eb;
      --card: #f6f7f9;
      --border: #e3e6ea;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, "Segoe UI", "Noto Sans KR", "Noto Sans SC", "Noto Sans JP", sans-serif;
    line-height: 1.6;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .brand { font-weight: 700; font-size: 1.1rem; }
  .lang-switch { display: flex; gap: 0.4rem; }
  .lang-switch button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 0.3rem 0.6rem;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .lang-switch button.active {
    color: var(--fg);
    border-color: var(--accent);
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 3rem 1.5rem 6rem;
  }
  h1 { font-size: 2rem; margin-bottom: 0.5rem; }
  .tagline { color: var(--muted); margin-top: 0; }
  .intro {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin: 2rem 0;
    white-space: pre-wrap;
  }
  .download-btn {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    padding: 0.85rem 1.6rem;
    border-radius: 8px;
    font-weight: 600;
    margin-top: 0.5rem;
  }
  .download-note { color: var(--muted); font-size: 0.85rem; margin-top: 0.6rem; }

  .coffee-banner {
    position: fixed;
    left: 50%;
    bottom: 1.25rem;
    transform: translate(-50%, 150%);
    transition: transform 0.35s ease;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.9rem 1.1rem;
    display: flex;
    align-items: center;
    gap: 0.9rem;
    max-width: calc(100% - 2rem);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    z-index: 20;
  }
  .coffee-banner.visible { transform: translate(-50%, 0); }
  .coffee-banner a {
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    padding: 0.5rem 0.9rem;
    border-radius: 6px;
    font-size: 0.9rem;
    white-space: nowrap;
  }
  .coffee-banner button.close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 0 0.2rem;
  }
  .coffee-text { font-size: 0.9rem; }
</style>
</head>
<body>
<header>
  <span class="brand">Electron Mangareader</span>
  <div class="lang-switch" id="lang-switch">
    <button data-lang="ko">한국어</button>
    <button data-lang="en">EN</button>
    <button data-lang="zh">中文</button>
    <button data-lang="ja">日本語</button>
  </div>
</header>

<main>
  <h1 data-i18n="title"></h1>
  <p class="tagline" data-i18n="tagline"></p>

  <div class="intro" data-i18n="intro"></div>

  <a class="download-btn" id="download-btn" href="#" data-i18n="downloadLabel"></a>
  <p class="download-note" data-i18n="downloadNote"></p>
</main>

<div class="coffee-banner" id="coffee-banner">
  <span class="coffee-text" data-i18n="coffeeText"></span>
  <a href="#" id="coffee-link" data-i18n="coffeeCta"></a>
  <button class="close" id="coffee-close" aria-label="close">&times;</button>
</div>

<script>
  // GitHub "latest release" stable download URL for this repo. The asset
  // filename must stay in sync with whatever gets attached to each Release.
  const DOWNLOAD_URL =
    'https://github.com/hak2da/electron-mangareader-site/releases/latest/download/ElectronMangareader-win-portable.exe'

  // TODO(user): replace with your real scheduling link (Calendly, etc.) or a
  // contact method before this goes live for real visitors.
  const COFFEE_CHAT_URL = '#'

  const STRINGS = {
    ko: {
      title: 'Electron Mangareader',
      tagline: '연속 스크롤 만화/코믹 뷰어 — 데스크톱 앱',
      intro:
        '같이 만들고 있는 만화 뷰어입니다.\n\n' +
        '주요 특징\n' +
        '- 스크롤로 편하게 넘겨보기 (연속 스크롤)\n' +
        '- 슬라이드쇼\n\n' +
        '지원 포맷\n' +
        '- 이미지: PNG, JPG, GIF, WEBP\n' +
        '- 압축 파일: ZIP, CBZ',
      downloadLabel: 'Windows용 다운로드',
      downloadNote: '무료 · Windows 포터블 실행 파일 (설치 불필요)',
      coffeeText: '여기까지 읽어주셨네요, 커피챗 어떠세요?',
      coffeeCta: '커피챗 신청'
    },
    en: {
      title: 'Electron Mangareader',
      tagline: 'A continuous-scroll comic/manga viewer for the desktop',
      intro:
        'A manga/comic viewer being built.\n\n' +
        'Key features\n' +
        '- Browse by scrolling (continuous scroll)\n' +
        '- Slideshow\n\n' +
        'Supported formats\n' +
        '- Images: PNG, JPG, GIF, WEBP\n' +
        '- Archives: ZIP, CBZ',
      downloadLabel: 'Download for Windows',
      downloadNote: 'Free · Windows portable executable (no install needed)',
      coffeeText: "You've read this far — want to grab a coffee chat?",
      coffeeCta: 'Book a coffee chat'
    },
    zh: {
      title: 'Electron Mangareader',
      tagline: '桌面端连续滚动漫画阅读器',
      intro:
        '正在开发中的漫画阅读器。\n\n' +
        '主要特点\n' +
        '- 可通过滚动轻松浏览（连续滚动）\n' +
        '- 幻灯片播放\n\n' +
        '支持格式\n' +
        '- 图片：PNG、JPG、GIF、WEBP\n' +
        '- 压缩包：ZIP、CBZ',
      downloadLabel: '下载 Windows 版',
      downloadNote: '免费 · Windows 便携版可执行文件（无需安装）',
      coffeeText: '看到这里了，要不要聊聊？',
      coffeeCta: '预约咖啡聊天'
    },
    ja: {
      title: 'Electron Mangareader',
      tagline: 'デスクトップ向け連続スクロール漫画ビューア',
      intro:
        '制作中のマンガビューアです。\n\n' +
        '主な特徴\n' +
        '- スクロールで気軽に閲覧（連続スクロール）\n' +
        '- スライドショー\n\n' +
        '対応フォーマット\n' +
        '- 画像：PNG、JPG、GIF、WEBP\n' +
        '- アーカイブ：ZIP、CBZ',
      downloadLabel: 'Windows版をダウンロード',
      downloadNote: '無料 · Windowsポータブル実行ファイル（インストール不要）',
      coffeeText: 'ここまで読んでいただけたら、コーヒーチャットどうですか？',
      coffeeCta: 'コーヒーチャットを予約'
    }
  }

  const SUPPORTED_LANGS = Object.keys(STRINGS)

  function detectDefaultLang() {
    const saved = localStorage.getItem('lang')
    if (saved && SUPPORTED_LANGS.includes(saved)) return saved
    const nav = (navigator.language || 'en').toLowerCase()
    if (nav.startsWith('ko')) return 'ko'
    if (nav.startsWith('zh')) return 'zh'
    if (nav.startsWith('ja')) return 'ja'
    return 'en'
  }

  function applyLang(lang) {
    const dict = STRINGS[lang] || STRINGS.en
    document.documentElement.lang = lang
    document.querySelectorAll('[data-i18n]').forEach((el) => {
      const key = el.getAttribute('data-i18n')
      if (dict[key] !== undefined) el.textContent = dict[key]
    })
    document.querySelectorAll('#lang-switch button').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.lang === lang)
    })
    localStorage.setItem('lang', lang)
  }

  document.getElementById('lang-switch').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-lang]')
    if (btn) applyLang(btn.dataset.lang)
  })

  document.getElementById('download-btn').href = DOWNLOAD_URL
  document.getElementById('coffee-link').href = COFFEE_CHAT_URL

  applyLang(detectDefaultLang())

  // Coffee-chat banner: reveal once the reader has scrolled a meaningful way
  // down the page (not just a quick glance), then leave it up — no per-visit
  // counting needed since the trigger is scroll depth on the current page.
  const banner = document.getElementById('coffee-banner')
  let shown = false
  function checkScrollDepth() {
    if (shown) return
    const scrolled = window.scrollY + window.innerHeight
    const full = document.documentElement.scrollHeight
    if (full > 0 && scrolled / full >= 0.65) {
      banner.classList.add('visible')
      shown = true
    }
  }
  window.addEventListener('scroll', checkScrollDepth, { passive: true })
  checkScrollDepth()

  document.getElementById('coffee-close').addEventListener('click', () => {
    banner.classList.remove('visible')
  })
</script>
</body>
</html>
