<!doctype html>
<html lang="ko">

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Yomu</title>
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<style>
  :root {
    color-scheme: light dark;
    --bg: #0f1115;
    --bg-soft: #14171d;
    --fg: #eef0f3;
    --muted: #9aa3af;
    --accent: #6ea8fe;
    --accent-2: #8f7bff;
    --card: #171a21;
    --border: #262b35;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #ffffff;
      --bg-soft: #f7f8fa;
      --fg: #14161a;
      --muted: #555c66;
      --accent: #2563eb;
      --accent-2: #6d5bd0;
      --card: #f6f7f9;
      --border: #e3e6ea;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, "Segoe UI", "Noto Sans KR", "Noto Sans SC", "Noto Sans JP", sans-serif;
    line-height: 1.6;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(8px);
    z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 0.55rem; font-weight: 700; font-size: 1.05rem; flex-shrink: 0; }
  .brand svg { width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0; }
  .lang-switch {
    display: flex;
    gap: 0.4rem;
    min-width: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .lang-switch::-webkit-scrollbar { display: none; }
  .lang-switch button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 0.3rem 0.6rem;
    cursor: pointer;
    font-size: 0.85rem;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .lang-switch button.active {
    color: var(--fg);
    border-color: var(--accent);
  }

  main { max-width: 760px; margin: 0 auto; padding: 0 1.5rem 6rem; }

  .hero {
    text-align: center;
    padding: 4.5rem 1rem 2.5rem;
  }
  .hero-logo { width: 84px; height: 84px; border-radius: 22px; box-shadow: 0 12px 32px rgba(37, 99, 235, 0.28); }
  .hero h1 { font-size: 2.6rem; margin: 1.3rem 0 0.5rem; letter-spacing: -0.02em; }
  .hero .tagline { color: var(--muted); margin: 0 auto; max-width: 34rem; font-size: 1.05rem; }

  .hero-demo {
    margin: 2.4rem auto 0;
    max-width: 400px;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
  }
  .hero-demo img { display: block; width: 100%; height: auto; }

  .cta { margin-top: 1.8rem; }
  .download-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    text-decoration: none;
    padding: 0.9rem 1.8rem;
    border-radius: 10px;
    font-weight: 600;
    font-size: 1.02rem;
    box-shadow: 0 10px 28px rgba(37, 99, 235, 0.32);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .download-btn:hover { transform: translateY(-1px); box-shadow: 0 14px 32px rgba(37, 99, 235, 0.4); }
  .download-btn svg { width: 18px; height: 18px; }
  .download-note { color: var(--muted); font-size: 0.85rem; margin-top: 0.7rem; }

  section.block { margin: 3.2rem 0; }
  .block h2 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 1.1rem;
    text-align: center;
  }

  .feature-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
  }
  .feature-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.4rem 1.2rem;
    text-align: center;
  }
  .feature-card .icon {
    width: 44px;
    height: 44px;
    margin: 0 auto 0.7rem;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: color-mix(in srgb, var(--accent) 16%, transparent);
    color: var(--accent);
  }
  .feature-card .icon svg { width: 24px; height: 24px; }
  .feature-card .label { font-weight: 600; font-size: 0.95rem; }

  .format-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5rem;
  }
  .format-row .group-label {
    width: 100%;
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    margin: 0.9rem 0 0.4rem;
  }
  .format-row .group-label:first-child { margin-top: 0; }
  .pill {
    border: 1px solid var(--border);
    background: var(--bg-soft);
    color: var(--fg);
    border-radius: 999px;
    padding: 0.35rem 0.85rem;
    font-size: 0.85rem;
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
  }

  .patch-entry {
    display: flex;
    gap: 1.1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.2rem 1.3rem;
  }
  .patch-date {
    flex-shrink: 0;
    color: var(--muted);
    font-size: 0.82rem;
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    padding-top: 0.15rem;
    white-space: nowrap;
  }
  .patch-title { font-weight: 600; margin-bottom: 0.35rem; }
  .patch-body p { margin: 0; color: var(--muted); font-size: 0.92rem; }
  .patch-entry + .patch-entry { margin-top: 0.9rem; }
  @media (max-width: 480px) {
    .patch-entry { flex-direction: column; gap: 0.4rem; }
  }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    padding: 2rem 1.5rem;
    border-top: 1px solid var(--border);
  }

  .support-banner {
    position: fixed;
    left: 50%;
    bottom: 1.25rem;
    transform: translate(-50%, 150%);
    transition: transform 0.35s ease;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.9rem 1.1rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.5rem 0.9rem;
    max-width: calc(100% - 2rem);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    z-index: 20;
  }
  .support-banner.visible { transform: translate(-50%, 0); }
  .support-banner a {
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    padding: 0.5rem 0.9rem;
    border-radius: 6px;
    font-size: 0.9rem;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .support-banner button.close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 0 0.2rem;
  }
  .support-text { font-size: 0.9rem; flex: 1 1 160px; min-width: 160px; }

  @media (max-width: 480px) {
    .hero { padding: 3rem 1rem 2rem; }
    .hero h1 { font-size: 2.1rem; }
    .feature-grid { grid-template-columns: 1fr; }
    .lang-switch { max-width: 55vw; }
  }
</style>

  const SUPPORTED_LANGS = Object.keys(STRINGS)

  function detectDefaultLang() {
    const saved = localStorage.getItem('lang')
    if (saved && SUPPORTED_LANGS.includes(saved)) return saved
    const nav = (navigator.language || 'en').toLowerCase()
    if (nav.startsWith('ko')) return 'ko'
    if (nav.startsWith('zh')) return 'zh'
    if (nav.startsWith('ja')) return 'ja'
    if (nav.startsWith('es')) return 'es'
    if (nav.startsWith('fr')) return 'fr'
    return 'en'
  }

  function applyLang(lang) {
    const dict = STRINGS[lang] || STRINGS.en
    document.documentElement.lang = lang
    document.querySelectorAll('[data-i18n]').forEach((el) => {
      const key = el.getAttribute('data-i18n')
      if (dict[key] !== undefined) el.textContent = dict[key]
    })
    document.querySelectorAll('#lang-switch button').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.lang === lang)
    })
    localStorage.setItem('lang', lang)
  }

  document.getElementById('lang-switch').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-lang]')
    if (btn) applyLang(btn.dataset.lang)
  })

  document.getElementById('download-btn').href = DOWNLOAD_URL
  document.getElementById('support-link').href = KOFI_URL

  applyLang(detectDefaultLang())

  // Support banner: reveal once the reader has scrolled all the way to the
  // bottom of the page, then leave it up — no per-visit counting needed
  // since the trigger is scroll depth on the current page.
  const banner = document.getElementById('support-banner')
  let shown = false
  function checkScrollDepth() {
    if (shown) return
    const scrolled = window.scrollY + window.innerHeight
    const full = document.documentElement.scrollHeight
    if (full > 0 && full - scrolled <= 4) {
      banner.classList.add('visible')
      shown = true
    }
  }
  window.addEventListener('scroll', checkScrollDepth, { passive: true })
  checkScrollDepth()

  document.getElementById('support-close').addEventListener('click', () => {
    banner.classList.remove('visible')
  })
</script>
</body>
</html>
